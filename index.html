<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta Segura - Análise de URL Pro</title>
  
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/6300/6300740.png">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-wrapper">
  <div class="container">
    <header class="main-header">
      <span class="header-icon">🔍</span>
      <h2>Consulta Segura</h2>
      <p class="subtitle">Análise profissional e instantânea de endereços web</p>
    </header>

    <main class="content">
      <div class="input-group">
        <label for="urlInput">Cole o endereço web aqui:</label>
        <div class="input-with-button">
          <input type="text" id="urlInput" placeholder="https://exemplo.com.br/pagina">
          <button onclick="scanURL()" class="btn-primary">
            Analisar Agora
          </button>
        </div>
      </div>

      <div id="result" class="result-area"></div>
    </main>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
