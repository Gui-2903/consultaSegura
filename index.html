<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consulta Segura</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    input {
      background: #334155;
      color: white;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 6px;
    }

    .loading {
      color: yellow;
      text-align: center;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🔍 Consulta Segura</h2>

  <!-- URL -->
  <input type="text" id="urlInput" placeholder="Cole uma URL">
  <button onclick="scanURL()">Analisar URL</button>

  <!-- FILE -->
  <input type="file" id="fileInput">
  <button onclick="scanFile()">Analisar Arquivo</button>

  <!-- RESULT -->
  <div id="result" class="result"></div>
</div>

<script>
  const BASE_URL = "https://vt-backend-consultasegura.onrender.com";

  const resultDiv = document.getElementById("result");

  function loading() {
    resultDiv.innerHTML = "<p class='loading'>⏳ Analisando...</p>";
  }

  function showError(msg) {
    resultDiv.innerHTML = `<p class="error">❌ ${msg}</p>`;
  }

  function showResult(data, link) {
    const stats = data.attributes.last_analysis_stats;

    resultDiv.innerHTML = `
      <h3>Resultado</h3>
      <p><strong>Malicioso:</strong> ${stats.malicious}</p>
      <p><strong>Suspeito:</strong> ${stats.suspicious}</p>
      <p><strong>Seguro:</strong> ${stats.harmless}</p>
      <a href="${link}" target="_blank">🔗 Ver relatório completo</a>
    `;
  }

  // 🔗 URL
  async function scanURL() {
    const url = document.getElementById("urlInput").value;

    if (!url) return alert("Digite uma URL");

    loading();

    try {
      const response = await fetch(`${BASE_URL}/scan-url`, {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `url=${encodeURIComponent(url)}`
      });

      const data = await response.json();

      console.log(data);
      const analysisId = data.data.links;

      await getResult(analysisId, "url");

    } catch (err) {
      showError("Erro ao analisar URL");
    }
  }

  // 📁 FILE
  async function scanFile() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) return alert("Selecione um arquivo");

    loading();

    const formData = new FormData();
    formData.append("file", file);

    try {
      const response = await fetch(`${BASE_URL}/scan-file`, {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      const analysisId = data.data.links;

      await getResult(analysisId, "file");

    } catch (err) {
      showError("Erro ao enviar arquivo");
    }
  }

  // 🔄 BUSCAR RESULTADO (Polling)
  async function getResult(id, type) {
    let tries = 0;

    while (tries < 10) {
      try {
        const res = await fetch(`${BASE_URL}/analysis/${id}`);
        const data = await res.json();

        if (data.data.attributes.status === "completed") {
          const link =
            type === "url"
              ? `https://www.virustotal.com/gui/url/${id}`
              : `https://www.virustotal.com/gui/file/${id}`;

          showResult(data.data, link);
          return;
        }

        await new Promise(r => setTimeout(r, 2000));
        tries++;

      } catch {
        showError("Erro ao buscar resultado");
        return;
      }
    }

    showError("Tempo excedido, tente novamente");
  }
</script>

</body>
</html>
