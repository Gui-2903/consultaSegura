<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>VirusTotal Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    input {
      background: #334155;
      color: white;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 6px;
    }

    .loading {
      text-align: center;
      color: #facc15;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔍 VirusTotal Scanner</h1>

  <!-- URL -->
  <input type="text" id="urlInput" placeholder="Cole uma URL aqui">
  <button onclick="scanURL()">Analisar URL</button>

  <!-- Arquivo -->
  <input type="file" id="fileInput">
  <button onclick="scanFile()">Analisar Arquivo</button>

  <!-- Resultado -->
  <div id="result" class="result"></div>
</div>

<script>
  // 🔑 COLOQUE SUA API KEY AQUI
  const API_KEY = "c3342ba0126f2bb04e5e0c23eb8905406a3b87d6775708e50856ea4bb23a4b10";

  const resultDiv = document.getElementById("result");

  function showLoading() {
    resultDiv.innerHTML = "<p class='loading'>⏳ Carregando...</p>";
  }

  function showResult(data, link) {
    const stats = data.attributes.last_analysis_stats;

    resultDiv.innerHTML = `
      <h3>Resultado</h3>
      <p><strong>Status:</strong> ${data.attributes.status || "Concluído"}</p>
      <p><strong>Malicioso:</strong> ${stats.malicious}</p>
      <p><strong>Suspeito:</strong> ${stats.suspicious}</p>
      <p><strong>Seguro:</strong> ${stats.harmless}</p>
      <p><a href="${link}" target="_blank">🔗 Ver relatório completo</a></p>
    `;
  }

  // ===============================
  // 🔗 ANALISAR URL
  // ===============================
  async function scanURL() {
    const url = document.getElementById("urlInput").value;

    if (!url) return alert("Digite uma URL!");

    showLoading();

    try {
      // Enviar URL
      const response = await fetch("https://www.virustotal.com/api/v3/urls", {
        method: "POST",
        headers: {
          "x-apikey": API_KEY,
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `url=${encodeURIComponent(url)}`
      });

      const data = await response.json();
      const analysisId = data.data.id;

      // Buscar resultado
      const resultResponse = await fetch(
        `https://www.virustotal.com/api/v3/analyses/${analysisId}`,
        {
          headers: { "x-apikey": API_KEY }
        }
      );

      const resultData = await resultResponse.json();

      showResult(
        resultData.data,
        `https://www.virustotal.com/gui/url/${analysisId}`
      );

    } catch (error) {
      resultDiv.innerHTML = `
        <p style="color:red;">Erro: ${error.message}</p>
        <p>⚠️ Possível erro de CORS. Veja instruções no código.</p>
      `;
    }
  }

  // ===============================
  // 📁 ANALISAR ARQUIVO
  // ===============================
  async function scanFile() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) return alert("Selecione um arquivo!");

    showLoading();

    const formData = new FormData();
    formData.append("file", file);

    try {
      const response = await fetch("https://www.virustotal.com/api/v3/files", {
        method: "POST",
        headers: {
          "x-apikey": API_KEY
        },
        body: formData
      });

      const data = await response.json();
      const analysisId = data.data.id;

      const resultResponse = await fetch(
        `https://www.virustotal.com/api/v3/analyses/${analysisId}`,
        {
          headers: { "x-apikey": API_KEY }
        }
      );

      const resultData = await resultResponse.json();

      showResult(
        resultData.data,
        `https://www.virustotal.com/gui/file/${analysisId}`
      );

    } catch (error) {
      resultDiv.innerHTML = `
        <p style="color:red;">Erro: ${error.message}</p>
        <p>⚠️ Possível erro de CORS.</p>
      `;
    }
  }

  /*
  ==========================================
  ⚠️ PROBLEMA DE CORS (IMPORTANTE)
  ==========================================

  A API do VirusTotal NÃO permite chamadas diretas do navegador.

  SOLUÇÕES:

  ✔️ 1. Usar extensão Chrome:
     - "Allow CORS"
     - "Moesif CORS"

  ✔️ 2. Usar um proxy local (RECOMENDADO):
     Exemplo Node.js:
     - Criar servidor que chama a API
     - Front chama o servidor

  ✔️ 3. Usar ferramentas como:
     - Vite dev server proxy
     - Express backend

  ⚠️ NUNCA exponha sua API Key em produção!
  */
</script>

</body>
</html>
